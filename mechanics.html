        const demoGrid = document.getElementById('demoGrid');
        const searchBox = document.getElementById('searchBox');
        const noResults = document.getElementById('noResults');
        const demoCount = document.getElementById('demoCount');
        
        function createFileName(code, title) {
            return code + '-' + title.replace(/[^a-zA-Z0-9\s\.-]/g, '').replace(/\s+/g, '-') + '.html';
        }
        
        function renderDemos(demosToShow) {
            demoGrid.innerHTML = '';
            
            if (demosToShow.length === 0) {
                demoGrid.style.display = 'none';
                noResults.style.display = 'block';
                return;
            }
            
            demoGrid.style.display = 'grid';
            noResults.style.display = 'none';
            
            demosToShow.forEach(demo => {
                const card = document.createElement('a');
                card.className = 'demo-card';
                card.href = createFileName(demo.code, demo.title);
                card.innerHTML = `
                    <div class="demo-code">${demo.code}</div>
                    <div class="demo-title">${demo.title}</div>
                `;
                demoGrid.appendChild(card);
            });
            
            demoCount.textContent = demosToShow.length;
        }
        
        searchBox.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filtered = demos.filter(demo => 
                demo.code.toLowerCase().includes(searchTerm) ||
                demo.title.toLowerCase().includes(searchTerm)
            );
            renderDemos(filtered);
        });
        
        renderDemos(demos);
    </script>
